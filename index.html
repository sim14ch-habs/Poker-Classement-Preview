<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Poker Stanley</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f4f6fb;
    color: #0f172a;
  }
  .preview-loader {
    width: min(520px, calc(100vw - 32px));
    padding: 24px 26px;
    border: 1px solid #d6deea;
    border-radius: 20px;
    background: linear-gradient(135deg, #ffffff 0%, #eef4ff 100%);
    box-shadow: 0 20px 44px rgba(15, 23, 42, 0.08);
  }
  .preview-loader h1 {
    margin: 0 0 8px 0;
    font-size: 28px;
  }
  .preview-loader p {
    margin: 0;
    color: #475569;
    line-height: 1.5;
  }
  .preview-loader strong {
    color: #1d4ed8;
  }
  .preview-loader.error {
    border-color: #fca5a5;
    background: linear-gradient(135deg, #ffffff 0%, #fff1f2 100%);
  }
</style>
</head>
<body>
<div class="preview-loader" id="preview-loader">
  <h1>Poker Stanley</h1>
  <p><strong>Chargement du preview…</strong><br />La vue simplifiée de distribution est en cours d’ajout.</p>
</div>
<script>
(async function() {
  var baseUrl = 'https://raw.githubusercontent.com/sim14ch-habs/Poker-Classement-Preview/2670a31718cbeb6fa699bfc6cea436881a370f1c/index.html';
  var patchTag = '<script src="./preview-distribution-patch.js"></' + 'script>';

  try {
    var response = await fetch(baseUrl, { cache: 'no-store' });
    if (!response.ok) {
      throw new Error('HTTP ' + response.status);
    }

    var html = await response.text();
    if (html.indexOf(patchTag) === -1) {
      html = html.replace('</body>', patchTag + '</body>');
    }

    document.open();
    document.write(html);
    document.close();
  }
  catch (error) {
    var loader = document.getElementById('preview-loader');
    if (!loader) { return; }
    loader.classList.add('error');
    loader.innerHTML = '<h1>Poker Stanley</h1><p><strong>Le preview n’a pas pu se charger automatiquement.</strong><br />Recharge la page dans un instant. Si le problème persiste, la base distante n’a pas encore fini de répondre.</p>';
    if (window.console && console.error) {
      console.error('Preview loader error', error);
    }
  }
})();
</script>
</body>
</html>
